<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Student Registration
</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="register-container">

<h1>
Student Registration
</h1>

<form id="registerForm">

<label>
Student Number
</label>

<input
type="text"
id="studentNumber"
required>

<label>
Residence
</label>

<select
id="residence"
required>

<option value="">
Select Residence
</option>

<option>
Alpha Residence
</option>

<option>
Beta Residence
</option>

<option>
Gamma Residence
</option>

<option>
Delta Residence
</option>

</select>

<button type="submit">

Continue

</button>

</form>

</div>

<script src="js/app.js"></script>

</body>

</html>
